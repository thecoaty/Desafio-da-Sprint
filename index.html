<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio da Sprint</title>
</head>
<body>
    <script>
        let distancia = parseFloat(prompt("Qual a distância percorrida da sua casa até o seu trabalho (em km)?"));
        let consumoMedioVeiculo = parseFloat(prompt("Qual o consumo médio do seu veículo (em km/L)?"));
        let consumoNecessario = distancia/consumoMedioVeiculo;
        document.write(`O Consumo necessario em litros para o deslocamento da casa até o trabalho é ${consumoNecessario}`);

        let postosPesquisados = parseInt(prompt("Em quantos postos você pesquisou?"));
        let menorValor = 100;
        let somaTotalValoresPesquisados = 0;
        for(i = 1; i <= postosPesquisados; i++){
            let valorPesquisado = parseFloat(prompt(`Digite o valor encontrado (em R$) no posto ${i}:`));
            somaTotalValoresPesquisados += valorPesquisado;
            //if achar o menor valor encontrado
            if(valorPesquisado < menorValor){
                menorValor = valorPesquisado;
            }
        }
        document.write(`<br>O menor valor pesquisado é R$${menorValor}`);
        let media = somaTotalValoresPesquisados/postosPesquisados;
        document.write(`<br> A média dos valores pesquisados é ${media}`);
        let gastoDiario = 2*(consumoNecessario*menorValor);
        document.write(`<br>Gasto diario (ida e volta) é R$ ${gastoDiario}`);

    </script>
</body>
</html>
